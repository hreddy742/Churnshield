version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: churnshield
      POSTGRES_USER: churnshield
      POSTGRES_PASSWORD: churnshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://churnshield:churnshield@db:5432/churnshield
    depends_on:
      - db
    volumes:
      - ./ml/models:/app/ml/models:ro
      - ./ml/data:/app/ml/data:ro

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - api

volumes:
  pgdata:
