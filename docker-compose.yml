services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data/churnguard.db:/app/data/churnguard.db
    command: >
      sh -lc "pip install -r requirements.txt &&
      uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/performance')"]
      interval: 30s
      timeout: 10s
      retries: 5

  streamlit:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data/churnguard.db:/app/data/churnguard.db
    command: >
      sh -lc "pip install -r requirements.txt &&
      streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

  mlflow:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data/churnguard.db:/app/data/churnguard.db
    command: >
      sh -lc "pip install mlflow &&
      mlflow server --backend-store-uri ${DATABASE_URL} --default-artifact-root ./mlruns
      --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 5
